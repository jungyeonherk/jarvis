# ════════════════════════════════════════════════════════════
# 자비스 클라우드 자동 스캐너
# ────────────────────────────────────────────────────────────
# 실행: 매일 한국시간 18:00 (UTC 09:00)
# 결과: docs/scan_result.json 자동 푸시
# ════════════════════════════════════════════════════════════

name: 🔎 J.A.R.V.I.S Daily Scan

on:
  schedule:
    # UTC 기준 09:00 = KST 18:00 (월~금)
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # 수동 실행 (GitHub Actions 탭에서 버튼 클릭)

permissions:
  contents: write  # docs/ 폴더에 푸시할 권한

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 최대 30분

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pykrx pandas

      - name: ☁️ 스캔 실행
        run: python cloud_scanner.py
        env:
          PYTHONUNBUFFERED: 1
          TZ: Asia/Seoul

      - name: 💾 결과 커밋 + 푸시
        run: |
          git config --local user.email "jarvis-bot@stark.industries"
          git config --local user.name "J.A.R.V.I.S Bot"

          git add docs/scan_result.json docs/scan_*.json

          # 변경 사항 있을 때만 커밋
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "🔎 자동 스캔 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
            git push
          fi

      - name: 📊 결과 요약
        if: always()
        run: |
          if [ -f docs/scan_result.json ]; then
            echo "## 🏆 스캔 결과" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('docs/scan_result.json') as f:
              d = json.load(f)
          print(f\"날짜: {d['date']}\")
          print(f\"전체 스캔: {d.get('total_scanned', 0)}종목\")
          print(f\"후보: {d['count']}종목\")
          print(f\"\")
          print(f\"| 순위 | 종목 | 코드 | 점수 | 시그널 |\")
          print(f\"|------|------|------|------|--------|\")
          for s in d['top10']:
              print(f\"| {s['rank']} | {s['name']} | {s['code']} | {s.get('final_score', s['score'])}점 | {s['signals']} |\")
          " >> $GITHUB_STEP_SUMMARY
          fi
